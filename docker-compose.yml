services:
  neo4j:
    image: neo4j:5.26-community
    container_name: lorekeeper-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/lorekeeper
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      # APOC export 파일을 host로 노출: apoc.export.cypher.all이 컨테이너의 import 디렉토리에
      # 쓰는 <variant>.cypher 덤프가 host의 poc/output/에 바로 떨어지게 한다.
      - ./poc/output:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "lorekeeper", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
